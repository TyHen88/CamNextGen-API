server:
  port: 8181

spring:
  application:
    name: CamNextGen
  datasource:
    url: jdbc:postgresql://localhost:5432/camnextgen_db
    username: postgres #windows
    password: psql@ty8080
#    username: mac_pg #mac
#    password: 12345678
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 20000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Email configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: hentyna11@gmail.com
    password: buikaqqkuuabnjqd
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  # rabbitmq configuration
  rabbitmq:
    host: localhost
    port: 5672
    stream:
      username: guest
      password: quest


security:
  jwt:
    issuer: camnextgen
    access-token-ttl: 7d
    refresh-token-ttl: 30d
    secret: ${JWT_SECRET:my-super-secret-jwt-key-for-development-only-32-chars}
  auth:
    verification-token-ttl: 24h
    password-reset-token-ttl: 30m
camgennext:
  email:
    from: ${EMAIL_FROM:hentyna11@gmail.com}
    from-name: ${EMAIL_FROM_NAME:CamNextGen}
    base-url: ${EMAIL_BASE_URL:http://localhost:3006}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    display-request-duration: true
  show-actuator: true

logging:
  level:
    root: INFO
    com.app.kh.camnextgen: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    
  file:
    name: logs/app.log
    logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

ratelimit:
  enabled: true
  capacity: 10
  refill-tokens: 10
  refill-duration: 1m



