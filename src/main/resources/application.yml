server:
  port: 8181

spring:
  application:
    name: CamNextGen
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/camnextgen_db}
    username: ${DB_USERNAME:mac_pg}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 20000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Email configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:hentyna11@gmail.com}
    password: ${MAIL_PASSWORD:buikaqqkuuabnjqd}
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

security:
  jwt:
    issuer: camnextgen
    access-token-ttl: 7d
    refresh-token-ttl: 30d
    secret: ${JWT_SECRET:G54+iTLytRoah3HOs49uJLiN9WARBPD/3SDHvpX83PZgdVhbJnYuD4KoLQ0JoyVkL2sqGddkPgAKnS95ScTTsw==}
  auth:
    verification-token-ttl: 24h
    password-reset-token-ttl: 30m
    otp-ttl: 5m
    otp-resend-cooldown: 1m
    otp-max-attempts: 5
camgennext:
  email:
    from: ${EMAIL_FROM:hentyna11@gmail.com}
    from-name: ${EMAIL_FROM_NAME:CamNextGen}
    base-url: ${EMAIL_BASE_URL:http://localhost:3000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    display-request-duration: true
  show-actuator: true

logging:
  level:
    root: INFO
    com.app.kh.camnextgen: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    
  file:
    name: logs/app.log
    logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

ratelimit:
  enabled: true
  capacity: 10
  refill-tokens: 10
  refill-duration: 1m
